name: Auto-Approve Safe Changes

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  check-auto-approve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          json: true

      - name: Evaluate auto-approve eligibility
        id: evaluate
        run: |
          echo "Evaluating changed files for auto-approve eligibility..."

          CHANGED_FILES='${{ steps.changed.outputs.all_changed_files }}'
          AUTO_APPROVE=true
          REASON=""

          # Parse JSON array of changed files
          for file in $(echo "$CHANGED_FILES" | jq -r '.[]'); do
            echo "  Checking: $file"

            # NEVER auto-approve changes to immutable files
            if [[ "$file" == "PRINCIPLES.md" || "$file" == "SOVEREIGNTY.md" ]]; then
              AUTO_APPROVE=false
              REASON="Immutable file modified: $file"
              break
            fi

            # NEVER auto-approve skill patches
            if [[ "$file" == skill-patches/* ]]; then
              AUTO_APPROVE=false
              REASON="Skill patch requires human review: $file"
              break
            fi

            # NEVER auto-approve new/modified decisions
            if [[ "$file" == decisions/* && "$file" != "decisions/_template.md" ]]; then
              AUTO_APPROVE=false
              REASON="Architecture decision requires human review: $file"
              break
            fi

            # NEVER auto-approve new/modified patterns
            if [[ "$file" == patterns/* && "$file" != "patterns/_template.md" ]]; then
              AUTO_APPROVE=false
              REASON="Pattern change requires human review: $file"
              break
            fi

            # NEVER auto-approve new anti-patterns
            if [[ "$file" == anti-patterns/* && "$file" != "anti-patterns/_template.md" ]]; then
              AUTO_APPROVE=false
              REASON="Anti-pattern requires human review: $file"
              break
            fi

            # Check lessons for critical severity
            if [[ "$file" == lessons/* && "$file" != "lessons/_template.md" ]]; then
              if [ -f "$file" ]; then
                SEVERITY=$(grep -m1 '^\*\*Severity:\*\*' "$file" | grep -oP '(critical|important|minor)' || echo "unknown")
                if [ "$SEVERITY" = "critical" ]; then
                  AUTO_APPROVE=false
                  REASON="Critical lesson requires human review: $file"
                  break
                fi
              fi
            fi

            # Auto-approvable: gas-benchmarks, ecosystem-state, non-critical lessons,
            # post-mortems (informational), templates, scripts, README updates
            if [[ "$file" == gas-benchmarks/* ]] || \
               [[ "$file" == ecosystem-state/* ]] || \
               [[ "$file" == scripts/* ]] || \
               [[ "$file" == .github/* ]] || \
               [[ "$file" == "README.md" ]]; then
              continue
            fi

            # If we get here with a lessons or post-mortems file that isn't critical, allow it
            if [[ "$file" == lessons/* || "$file" == post-mortems/* ]]; then
              continue
            fi
          done

          echo "auto_approve=$AUTO_APPROVE" >> $GITHUB_OUTPUT
          echo "reason=$REASON" >> $GITHUB_OUTPUT

          if [ "$AUTO_APPROVE" = true ]; then
            echo "✅ All changes are auto-approvable"
          else
            echo "❌ Human review required: $REASON"
          fi

      - name: Auto-approve PR
        if: steps.evaluate.outputs.auto_approve == 'true'
        uses: hmarr/auto-approve-action@v4
        with:
          review-message: |
            ✅ Auto-approved by Swarm Learning Loop.

            This PR only modifies safe categories (gas benchmarks, ecosystem state,
            non-critical lessons, or post-mortems). No human review required.

      - name: Add auto-merge label
        if: steps.evaluate.outputs.auto_approve == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['auto-approved']
            });

      - name: Comment on non-auto-approvable PR
        if: steps.evaluate.outputs.auto_approve == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⏳ **Human review required.**\n\nReason: ${{ steps.evaluate.outputs.reason }}\n\nThis PR modifies files that require human approval before merge. See \`.github/workflows/human-review.yml\` for the review gate policy.`
            });
